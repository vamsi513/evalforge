services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evalforge
      POSTGRES_USER: evalforge
      POSTGRES_PASSWORD: evalforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalforge -d evalforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://evalforge:evalforge@postgres:5432/evalforge
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
