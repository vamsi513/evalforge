services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evalforge
      POSTGRES_USER: evalforge
      POSTGRES_PASSWORD: evalforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalforge -d evalforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://evalforge:evalforge@postgres:5432/evalforge
      AUTO_CREATE_TABLES: "false"
      ASYNC_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: ["python", "-m", "app.workers.redis_worker"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://evalforge:evalforge@postgres:5432/evalforge
      AUTO_CREATE_TABLES: "false"
      ASYNC_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
