name: Release Gate Decision

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  evalgate-decision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI script dependencies
        run: python -m pip install --upgrade pip httpx

      - name: Enforce release-gate decision
        env:
          EVALFORGE_API_URL: ${{ vars.EVALFORGE_API_URL }}
          EVALFORGE_DATASET: ${{ vars.EVALFORGE_DATASET }}
          EVALFORGE_EXPERIMENT: ${{ vars.EVALFORGE_EXPERIMENT }}
          EVALFORGE_WORKSPACE: ${{ vars.EVALFORGE_WORKSPACE }}
          EVALFORGE_API_KEY: ${{ secrets.EVALFORGE_API_KEY }}
          EVALFORGE_REQUIRE_GATE_DECISION: ${{ vars.EVALFORGE_REQUIRE_GATE_DECISION }}
        run: |
          python scripts/ci/check_release_gate.py
